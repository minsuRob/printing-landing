<!doctype html>
<html lang="ko" class="dark">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/printing-landing/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>신의데코프린팅 - 프리미엄 열전사 솔루션</title>
        
        <!-- 보안 설정: CSP (Content Security Policy) -->
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:; media-src 'self' data: blob: https://assets.mixkit.co https://cdn.pixabay.com https://pixabay.com;">
        
        <!-- 보안 설정: 기타 보안 헤더 -->
        <meta http-equiv="X-XSS-Protection" content="1; mode=block">
        <meta name="referrer" content="no-referrer-when-downgrade">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
        
        <!-- 보안 스크립트: 우클릭 방지 및 개발자 도구 차단 -->
        <script>
            // 우클릭 방지
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });

            // 단축키 방지 (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U)
            document.onkeydown = function(e) {
                if(event.keyCode == 123) { // F12
                    return false;
                }
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I
                    return false;
                }
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+Shift+C
                    return false;
                }
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Ctrl+Shift+J
                    return false;
                }
                if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U
                    return false;
                }
            };
        </script>
      <script type="module" crossorigin src="/printing-landing/assets/index-DLMXbSq5.js"></script>
      <link rel="stylesheet" crossorigin href="/printing-landing/assets/index-24CkXRRC.css">
    </head>
    <body
        class="bg-background text-textMain antialiased overflow-x-hidden selection:bg-primary selection:text-black"
    >
        <div id="root"></div>
    </body>
</html>
